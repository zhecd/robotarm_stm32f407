<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <style>
    .title { font: 700 34px Arial, sans-serif; fill: #1f2937; }
    .root { fill: #2563eb; }
    .lvl1 { fill: #dbeafe; stroke: #60a5fa; stroke-width: 2; }
    .lvl2 { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
    .rootText { font: 700 22px Arial, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
    .lvl1Text { font: 700 20px Arial, sans-serif; fill: #1e3a8a; text-anchor: middle; dominant-baseline: middle; }
    .lvl2Text { font: 15px Arial, sans-serif; fill: #334155; text-anchor: middle; dominant-baseline: middle; }
    .line1 { stroke: #60a5fa; stroke-width: 3; fill: none; }
    .line2 { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
  </style>

  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="900" y="50" class="title" text-anchor="middle">F407AS5600_2 Project Mindmap</text>

  <line x1="900" y1="170" x2="900" y2="130" class="line1"/>
  <rect x="770" y="170" rx="18" ry="18" width="260" height="72" class="root"/>
  <text x="900" y="206" class="rootText">F407AS5600_2</text>

  <line x1="900" y1="242" x2="200" y2="320" class="line1"/>
  <line x1="900" y1="242" x2="600" y2="320" class="line1"/>
  <line x1="900" y1="242" x2="900" y2="320" class="line1"/>
  <line x1="900" y1="242" x2="1200" y2="320" class="line1"/>
  <line x1="900" y1="242" x2="1500" y2="320" class="line1"/>
  <line x1="900" y1="242" x2="450" y2="760" class="line1"/>
  <line x1="900" y1="242" x2="1350" y2="760" class="line1"/>

  <rect x="95" y="320" rx="14" ry="14" width="210" height="56" class="lvl1"/>
  <text x="200" y="348" class="lvl1Text">Project Goal</text>

  <rect x="485" y="320" rx="14" ry="14" width="230" height="56" class="lvl1"/>
  <text x="600" y="348" class="lvl1Text">Application Layer</text>

  <rect x="775" y="320" rx="14" ry="14" width="250" height="56" class="lvl1"/>
  <text x="900" y="348" class="lvl1Text">Input / Protocol Layer</text>

  <rect x="1095" y="320" rx="14" ry="14" width="210" height="56" class="lvl1"/>
  <text x="1200" y="348" class="lvl1Text">Motion Layer</text>

  <rect x="1375" y="320" rx="14" ry="14" width="250" height="56" class="lvl1"/>
  <text x="1500" y="348" class="lvl1Text">Hardware Drivers</text>

  <rect x="315" y="760" rx="14" ry="14" width="270" height="56" class="lvl1"/>
  <text x="450" y="788" class="lvl1Text">MCU Peripheral Support</text>

  <rect x="1220" y="760" rx="14" ry="14" width="260" height="56" class="lvl1"/>
  <text x="1350" y="788" class="lvl1Text">Runtime Paths</text>

  <!-- Goal -->
  <line x1="200" y1="376" x2="120" y2="450" class="line2"/>
  <line x1="200" y1="376" x2="280" y2="450" class="line2"/>
  <line x1="200" y1="376" x2="120" y2="530" class="line2"/>
  <line x1="200" y1="376" x2="280" y2="530" class="line2"/>
  <rect x="20" y="425" rx="10" ry="10" width="200" height="50" class="lvl2"/>
  <text x="120" y="450" class="lvl2Text">STM32F407 robotic arm</text>
  <rect x="180" y="425" rx="10" ry="10" width="200" height="50" class="lvl2"/>
  <text x="280" y="450" class="lvl2Text">G-code control mode</text>
  <rect x="20" y="505" rx="10" ry="10" width="200" height="50" class="lvl2"/>
  <text x="120" y="530" class="lvl2Text">PS2 teleop mode</text>
  <rect x="180" y="505" rx="10" ry="10" width="200" height="50" class="lvl2"/>
  <text x="280" y="530" class="lvl2Text">Servo gripper control</text>

  <!-- Application -->
  <line x1="600" y1="376" x2="600" y2="450" class="line2"/>
  <line x1="600" y1="376" x2="600" y2="530" class="line2"/>
  <line x1="600" y1="376" x2="600" y2="610" class="line2"/>
  <rect x="470" y="425" rx="10" ry="10" width="260" height="50" class="lvl2"/>
  <text x="600" y="450" class="lvl2Text">main.c - startup and loop</text>
  <rect x="470" y="505" rx="10" ry="10" width="260" height="50" class="lvl2"/>
  <text x="600" y="530" class="lvl2Text">app_teleop.c - PS2 task</text>
  <rect x="470" y="585" rx="10" ry="10" width="260" height="50" class="lvl2"/>
  <text x="600" y="610" class="lvl2Text">cmd_executor.c - command exec</text>

  <!-- Input -->
  <line x1="900" y1="376" x2="900" y2="450" class="line2"/>
  <line x1="900" y1="376" x2="900" y2="530" class="line2"/>
  <line x1="900" y1="376" x2="900" y2="610" class="line2"/>
  <rect x="760" y="425" rx="10" ry="10" width="280" height="50" class="lvl2"/>
  <text x="900" y="450" class="lvl2Text">bsp_uart1.c - RX buffer / line read</text>
  <rect x="760" y="505" rx="10" ry="10" width="280" height="50" class="lvl2"/>
  <text x="900" y="530" class="lvl2Text">gcode_parser.c - parse G/M/X/Y/Z/F</text>
  <rect x="760" y="585" rx="10" ry="10" width="280" height="50" class="lvl2"/>
  <text x="900" y="610" class="lvl2Text">bsp_ps2.c - controller driver</text>

  <!-- Motion -->
  <line x1="1200" y1="376" x2="1200" y2="450" class="line2"/>
  <line x1="1200" y1="376" x2="1200" y2="530" class="line2"/>
  <line x1="1200" y1="376" x2="1200" y2="610" class="line2"/>
  <rect x="1070" y="425" rx="10" ry="10" width="260" height="50" class="lvl2"/>
  <text x="1200" y="450" class="lvl2Text">motion_planner.c - interpolation</text>
  <rect x="1070" y="505" rx="10" ry="10" width="260" height="50" class="lvl2"/>
  <text x="1200" y="530" class="lvl2Text">robotGeometry.c - inverse kinematics</text>
  <rect x="1070" y="585" rx="10" ry="10" width="260" height="50" class="lvl2"/>
  <text x="1200" y="610" class="lvl2Text">motor_core.c - frame scheduling</text>

  <!-- Drivers -->
  <line x1="1500" y1="376" x2="1500" y2="450" class="line2"/>
  <line x1="1500" y1="376" x2="1500" y2="530" class="line2"/>
  <line x1="1500" y1="376" x2="1500" y2="610" class="line2"/>
  <line x1="1500" y1="376" x2="1500" y2="690" class="line2"/>
  <rect x="1360" y="425" rx="10" ry="10" width="280" height="50" class="lvl2"/>
  <text x="1500" y="450" class="lvl2Text">bsp_stepper.c - step / dir / enable</text>
  <rect x="1360" y="505" rx="10" ry="10" width="280" height="50" class="lvl2"/>
  <text x="1500" y="530" class="lvl2Text">bsp_tmc2209.c - UART config</text>
  <rect x="1360" y="585" rx="10" ry="10" width="280" height="50" class="lvl2"/>
  <text x="1500" y="610" class="lvl2Text">bsp_gripper.c - PWM gripper</text>
  <rect x="1360" y="665" rx="10" ry="10" width="280" height="50" class="lvl2"/>
  <text x="1500" y="690" class="lvl2Text">bsp_led.c - status LEDs</text>

  <!-- MCU -->
  <line x1="450" y1="816" x2="330" y2="900" class="line2"/>
  <line x1="450" y1="816" x2="570" y2="900" class="line2"/>
  <line x1="450" y1="816" x2="330" y2="980" class="line2"/>
  <line x1="450" y1="816" x2="570" y2="980" class="line2"/>
  <rect x="240" y="875" rx="10" ry="10" width="180" height="50" class="lvl2"/>
  <text x="330" y="900" class="lvl2Text">gpio.c</text>
  <rect x="480" y="875" rx="10" ry="10" width="180" height="50" class="lvl2"/>
  <text x="570" y="900" class="lvl2Text">tim.c</text>
  <rect x="240" y="955" rx="10" ry="10" width="180" height="50" class="lvl2"/>
  <text x="330" y="980" class="lvl2Text">usart.c</text>
  <rect x="480" y="955" rx="10" ry="10" width="180" height="50" class="lvl2"/>
  <text x="570" y="980" class="lvl2Text">stm32f4xx_it.c</text>

  <!-- Runtime -->
  <line x1="1350" y1="816" x2="1350" y2="900" class="line2"/>
  <line x1="1350" y1="816" x2="1350" y2="980" class="line2"/>
  <rect x="1170" y="875" rx="10" ry="10" width="360" height="50" class="lvl2"/>
  <text x="1350" y="900" class="lvl2Text">G-code: UART -> Parser -> Executor -> Planner -> Motor Core -> Stepper</text>
  <rect x="1170" y="955" rx="10" ry="10" width="360" height="50" class="lvl2"/>
  <text x="1350" y="980" class="lvl2Text">PS2: PS2 -> Teleop Task -> Planner Step -> Motor Core -> Stepper</text>
</svg>
