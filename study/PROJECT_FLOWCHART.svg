<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="2200" viewBox="0 0 1500 2200">
  <style>
    .title { font: 700 34px Arial, sans-serif; fill: #1f2937; }
    .box { fill: #f8fafc; stroke: #64748b; stroke-width: 2; rx: 14; ry: 14; }
    .decision { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
    .text { font: 17px Arial, sans-serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
    .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="750" y="50" class="title" text-anchor="middle">F407AS5600_2 Runtime Flowchart</text>

  <rect x="560" y="90" width="380" height="56" rx="14" ry="14" class="box"/>
  <text x="750" y="118" class="text">Power On / Reset</text>

  <rect x="560" y="190" width="380" height="56" rx="14" ry="14" class="box"/>
  <text x="750" y="218" class="text">HAL_Init + SystemClock_Config</text>

  <rect x="560" y="290" width="380" height="56" rx="14" ry="14" class="box"/>
  <text x="750" y="318" class="text">Initialize GPIO / UART / TIM</text>

  <rect x="560" y="390" width="380" height="56" rx="14" ry="14" class="box"/>
  <text x="750" y="418" class="text">Initialize BSP: LED / Stepper / UART1 / PS2 / Gripper</text>

  <rect x="560" y="490" width="380" height="56" rx="14" ry="14" class="box"/>
  <text x="750" y="518" class="text">Configure TMC2209 Nodes</text>

  <rect x="560" y="590" width="380" height="56" rx="14" ry="14" class="box"/>
  <text x="750" y="618" class="text">Init Motion Core / Planner / Executor</text>

  <rect x="560" y="690" width="380" height="56" rx="14" ry="14" class="box"/>
  <text x="750" y="718" class="text">Start TIM6 Interrupt</text>

  <rect x="560" y="790" width="380" height="56" rx="14" ry="14" class="box"/>
  <text x="750" y="818" class="text">Enter Main Loop</text>

  <rect x="560" y="890" width="380" height="56" rx="14" ry="14" class="box"/>
  <text x="750" y="918" class="text">Run App_Teleop_Task</text>

  <polygon points="750,1000 920,1080 750,1160 580,1080" class="decision"/>
  <text x="750" y="1080" class="text">Current Mode?</text>

  <!-- Gcode branch -->
  <rect x="120" y="1230" width="360" height="56" rx="14" ry="14" class="box"/>
  <text x="300" y="1258" class="text">Read UART1 Line</text>

  <polygon points="300,1350 440,1415 300,1480 160,1415" class="decision"/>
  <text x="300" y="1415" class="text">Line Ready?</text>

  <rect x="120" y="1540" width="360" height="56" rx="14" ry="14" class="box"/>
  <text x="300" y="1568" class="text">GCode_ParseLine</text>

  <polygon points="300,1655 440,1720 300,1785 160,1720" class="decision"/>
  <text x="300" y="1720" class="text">Parse Success?</text>

  <rect x="120" y="1845" width="360" height="56" rx="14" ry="14" class="box"/>
  <text x="300" y="1873" class="text">Cmd_Executor_Run</text>

  <rect x="120" y="1945" width="360" height="56" rx="14" ry="14" class="box"/>
  <text x="300" y="1973" class="text">Compute Target + Duration</text>

  <rect x="120" y="2045" width="360" height="56" rx="14" ry="14" class="box"/>
  <text x="300" y="2073" class="text">Motion_Planner_MoveLine -> Push Frames</text>

  <!-- PS2 branch -->
  <rect x="1020" y="1230" width="360" height="56" rx="14" ry="14" class="box"/>
  <text x="1200" y="1258" class="text">Read PS2 Controller</text>

  <rect x="1020" y="1330" width="360" height="56" rx="14" ry="14" class="box"/>
  <text x="1200" y="1358" class="text">Decode Buttons + Joysticks</text>

  <rect x="1020" y="1430" width="360" height="56" rx="14" ry="14" class="box"/>
  <text x="1200" y="1458" class="text">Generate dx / dy / dz</text>

  <rect x="1020" y="1530" width="360" height="56" rx="14" ry="14" class="box"/>
  <text x="1200" y="1558" class="text">Motion_Planner_TeleopStep</text>

  <rect x="1020" y="1630" width="360" height="56" rx="14" ry="14" class="box"/>
  <text x="1200" y="1658" class="text">Push Short Motion Frame</text>

  <!-- execution -->
  <rect x="560" y="1845" width="380" height="56" rx="14" ry="14" class="box"/>
  <text x="750" y="1873" class="text">TIM6 Interrupt Pops Current Frame</text>

  <rect x="560" y="1945" width="380" height="56" rx="14" ry="14" class="box"/>
  <text x="750" y="1973" class="text">Set Directions + Distribute Steps</text>

  <rect x="560" y="2045" width="380" height="56" rx="14" ry="14" class="box"/>
  <text x="750" y="2073" class="text">Output Step Pulses + Update Positions</text>

  <line x1="750" y1="146" x2="750" y2="190" class="arrow"/>
  <line x1="750" y1="246" x2="750" y2="290" class="arrow"/>
  <line x1="750" y1="346" x2="750" y2="390" class="arrow"/>
  <line x1="750" y1="446" x2="750" y2="490" class="arrow"/>
  <line x1="750" y1="546" x2="750" y2="590" class="arrow"/>
  <line x1="750" y1="646" x2="750" y2="690" class="arrow"/>
  <line x1="750" y1="746" x2="750" y2="790" class="arrow"/>
  <line x1="750" y1="846" x2="750" y2="890" class="arrow"/>
  <line x1="750" y1="946" x2="750" y2="1000" class="arrow"/>

  <line x1="580" y1="1080" x2="300" y2="1080" class="arrow"/>
  <line x1="300" y1="1080" x2="300" y2="1230" class="arrow"/>

  <line x1="920" y1="1080" x2="1200" y2="1080" class="arrow"/>
  <line x1="1200" y1="1080" x2="1200" y2="1230" class="arrow"/>

  <line x1="300" y1="1286" x2="300" y2="1350" class="arrow"/>
  <line x1="300" y1="1480" x2="300" y2="1540" class="arrow"/>
  <line x1="300" y1="1596" x2="300" y2="1655" class="arrow"/>
  <line x1="300" y1="1785" x2="300" y2="1845" class="arrow"/>
  <line x1="300" y1="1901" x2="300" y2="1945" class="arrow"/>
  <line x1="300" y1="2001" x2="300" y2="2045" class="arrow"/>

  <line x1="1200" y1="1286" x2="1200" y2="1330" class="arrow"/>
  <line x1="1200" y1="1386" x2="1200" y2="1430" class="arrow"/>
  <line x1="1200" y1="1486" x2="1200" y2="1530" class="arrow"/>
  <line x1="1200" y1="1586" x2="1200" y2="1630" class="arrow"/>

  <line x1="480" y1="2073" x2="560" y2="1873" class="arrow"/>
  <line x1="1020" y1="1658" x2="940" y2="1873" class="arrow"/>
  <line x1="750" y1="1901" x2="750" y2="1945" class="arrow"/>
  <line x1="750" y1="2001" x2="750" y2="2045" class="arrow"/>
</svg>
